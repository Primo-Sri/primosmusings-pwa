<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Primosmusings Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0e0e0e; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; padding: 24px 16px 40px;
}

/* ── Auth ─────────────────────────── */
#auth-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 85vh; gap: 16px;
}
#auth-screen h1 { font-size: 1.8rem; color: #e8aa30; }
#auth-screen p  { color: rgba(255,255,255,.45); font-size: .85rem; }
.auth-input {
  background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 14px;
  color: #fff; font-size: 1rem; padding: 14px 18px;
  width: 100%; max-width: 320px; outline: none;
}
.auth-input:focus { border-color: #e8aa30; }
#sign-in-btn {
  background: #e8aa30; color: #000; font-weight: 700; border: none;
  border-radius: 14px; font-size: 1rem; padding: 14px 0;
  cursor: pointer; width: 100%; max-width: 320px;
}
#auth-error { color: #ff5555; font-size: .85rem; min-height: 20px; }
#sign-out-btn {
  background: transparent; color: rgba(255,255,255,.4);
  border: 1px solid #2a2a2a; border-radius: 8px;
  font-size: .75rem; padding: 6px 14px; cursor: pointer;
  float: right; margin-bottom: 12px;
}

/* ── Admin ────────────────────────── */
#admin-screen { display: none; max-width: 560px; margin: 0 auto; }
.page-title { font-size: 1.3rem; color: #e8aa30; font-weight: 700; margin-bottom: 4px; }
.page-sub   { font-size: .8rem; color: rgba(255,255,255,.4); margin-bottom: 20px; }

/* ── Episode cards ────────────────── */
.ep-card {
  background: #141414; border: 1.5px solid #222; border-radius: 14px;
  margin-bottom: 8px; overflow: hidden;
}
.ep-card.tagged  { border-color: rgba(232,170,48,.35); }
.ep-card.open    { border-color: #444; }
.ep-header {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 14px; cursor: pointer;
}
.ep-date  { font-size: .68rem; color: rgba(255,255,255,.35); min-width: 54px; padding-top: 2px; }
.ep-title { font-size: .88rem; line-height: 1.45; flex: 1; }
.ep-badge {
  font-size: .63rem; font-weight: 700; background: rgba(232,170,48,.15);
  color: #e8aa30; border-radius: 20px; padding: 3px 8px; white-space: nowrap;
  align-self: flex-start; margin-top: 1px;
}
.ep-body { display: none; padding: 0 14px 14px; border-top: 1px solid #222; }
.ep-card.open .ep-body { display: block; }
.ep-body label { font-size: .72rem; color: rgba(255,255,255,.4); display: block; margin: 12px 0 6px; }
.ep-body input {
  width: 100%; background: #0e0e0e; border: 1.5px solid #2a2a2a;
  border-radius: 10px; color: #fff; font-size: 1rem;
  padding: 11px 14px; outline: none; margin-bottom: 12px;
}
.ep-body input:focus { border-color: #e8aa30; }
.btn-row { display: flex; gap: 8px; }
.save-btn {
  background: #e8aa30; color: #000; font-weight: 700; border: none;
  border-radius: 10px; padding: 11px 24px; font-size: .9rem; cursor: pointer; flex: 1;
}
.remove-btn {
  background: transparent; color: rgba(255,255,255,.4);
  border: 1.5px solid #2a2a2a; border-radius: 10px;
  padding: 11px 18px; font-size: .9rem; cursor: pointer;
}
.confirm-msg { font-size: .8rem; color: #4caf50; margin-top: 10px; display: none; }
.srt-row { margin-top: 14px; padding-top: 14px; border-top: 1px solid #1e1e1e; }
.srt-row label { font-size: .72rem; color: rgba(255,255,255,.35); display: block; margin-bottom: 8px; }
.srt-btn {
  width: 100%; background: transparent; border: 1.5px dashed #333;
  border-radius: 10px; color: rgba(255,255,255,.5);
  padding: 11px; font-size: .85rem; cursor: pointer; text-align: center;
}
.srt-btn:active { background: rgba(255,255,255,.05); }
.srt-status { font-size: .78rem; display: block; margin-top: 8px; min-height: 18px; }

#loading-msg { color: rgba(255,255,255,.45); font-size: .9rem; padding: 24px 0; }
#error-msg   { color: #ff5555; font-size: .9rem; padding: 24px 0; display: none; }
</style>
</head>
<body>

<!-- ── Sign-in gate ───────────────────────────────── -->
<div id="auth-screen">
  <h1>🎙 Admin</h1>
  <p>Primosmusings guest tagging</p>
  <input class="auth-input" type="email"    id="email-input"    placeholder="Email"
         autocomplete="email" onkeydown="if(event.key==='Enter') signIn()">
  <input class="auth-input" type="password" id="password-input" placeholder="Password"
         autocomplete="current-password" onkeydown="if(event.key==='Enter') signIn()">
  <button id="sign-in-btn" onclick="signIn()">Sign in</button>
  <p id="auth-error"></p>
</div>

<!-- ── Admin screen ──────────────────────────────── -->
<div id="admin-screen">
  <button id="sign-out-btn" onclick="signOut()">Sign out</button>

  <p class="page-title">📊 Top Played (in-app)</p>
  <p class="page-sub">Plays inside your app since v42 — Spotify dashboard has platform-wide stats</p>
  <div id="stats-list" style="margin-bottom:28px"><span style="color:rgba(255,255,255,.35);font-size:.85rem">Loading…</span></div>

  <p class="page-title">🎙 Tag a Guest</p>
  <p class="page-sub">Tap an episode to add or update its guest</p>
  <div id="loading-msg">Loading recent episodes…</div>
  <div id="error-msg"></div>
  <div id="ep-list"></div>
</div>

<datalist id="guest-names">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const RSS_URL  = 'https://primosmusings-rss.primosmusings.workers.dev/';
const PROXIES  = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

let db;
let episodes  = [];  // { title, url, pub, year }
let tagsByUrl = {};  // url → { id, guestName }

// ── Auth ──────────────────────────────────────────────────────────────
// Firebase Auth handles login — credentials are verified server-side,
// never exposed in source code.

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById('auth-screen').style.display  = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadAdminData();
  } else {
    document.getElementById('auth-screen').style.display  = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
  }
});

async function signIn() {
  const email    = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Enter your email and password.'; return; }
  try {
    document.getElementById('sign-in-btn').textContent = 'Signing in…';
    await firebase.auth().signInWithEmailAndPassword(email, password);
    // onAuthStateChanged fires automatically after this
  } catch(e) {
    document.getElementById('sign-in-btn').textContent = 'Sign in';
    errEl.textContent = 'Sign-in failed. Check your email and password.';
  }
}

function signOut() {
  firebase.auth().signOut();
  // Reset episode list so next login re-fetches
  episodes  = [];
  tagsByUrl = {};
  document.getElementById('ep-list').innerHTML = '';
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('error-msg').style.display   = 'none';
}

// ── Main loader — Firestore first, RSS fallback ────────────────────────
// Episodes are cached in Firestore by the main app after every RSS load.
// This means admin.html never needs external CORS proxies on normal use.
async function loadAdminData() {
  if (typeof firebase === 'undefined') { loadRSS(); return; }

  loadPlayStats();

  try {
    db = firebase.firestore();

    // Load tags and episode cache in parallel
    const [tagsSnap, cacheDoc] = await Promise.all([
      db.collection('episodeTags').get(),
      db.collection('cache').doc('recentEpisodes').get(),
    ]);

    tagsSnap.forEach(doc => {
      const d = doc.data();
      if (d.episodeUrl) tagsByUrl[d.episodeUrl] = { id: doc.id, guestName: d.guestName };
    });

    const cached = cacheDoc.exists ? (cacheDoc.data().episodes || []) : [];
    if (cached.length > 0) {
      // Great — use Firestore cache (fast, no external requests)
      episodes = cached.map(e => ({
        title: e.title,
        url:   e.url,
        pub:   fmtDate(e.pub),
        year:  new Date(e.pub).getFullYear() || new Date().getFullYear(),
      }));
      renderEpisodeList();
      return;
    }
  } catch(e) { /* Firestore unavailable — try RSS */ }

  // No Firestore cache yet — fall back to RSS proxies.
  // Cache is populated the first time you open the main app.
  loadRSS();
}

// ── Play stats (in-app analytics) ───────────────────────────────────────
async function loadPlayStats() {
  const el = document.getElementById('stats-list');
  try {
    const snap = await firebase.firestore()
      .collection('playStats').orderBy('count', 'desc').limit(10).get();
    if (snap.empty) {
      el.innerHTML = '<span style="color:rgba(255,255,255,.35);font-size:.85rem">No plays recorded yet — stats appear once listeners start using the in-app player.</span>';
      return;
    }
    let total = 0;
    snap.forEach(d => total += (d.data().count || 0));
    el.innerHTML = snap.docs.map((doc, i) => {
      const d = doc.data();
      const when = d.lastPlayed?.toDate ? d.lastPlayed.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e1e">
        <span style="color:#e8aa30;font-weight:800;font-size:.8rem;width:18px">${i+1}</span>
        <span style="flex:1;font-size:.82rem;line-height:1.35">${d.title}</span>
        <span style="color:#1DB954;font-weight:800;font-size:.85rem;white-space:nowrap">${d.count || 0}×</span>
        <span style="color:rgba(255,255,255,.3);font-size:.7rem;white-space:nowrap">${when}</span>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<span style="color:rgba(255,255,255,.35);font-size:.85rem">Stats unavailable.</span>';
  }
}

// ── RSS fallback (rss2json first, then XML proxies) ─────────────────────
async function loadRSS() {
  // Try rss2json — same fix as the main app
  try {
    const res = await fetch(
      `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`,
      { signal: AbortSignal.timeout(12000) }
    );
    if (res.ok) {
      const data = await res.json();
      if (data.status === 'ok' && data.items?.length) {
        episodes = data.items.map(item => ({
          title: item.title || '',
          url:   item.link  || item.guid || '',
          pub:   fmtDate(item.pubDate || ''),
          year:  new Date(item.pubDate || '').getFullYear() || new Date().getFullYear(),
        }));
        renderEpisodeList();
        return;
      }
    }
  } catch(e) {}

  for (const proxy of PROXIES) {
    try {
      const res  = await fetch(proxy(RSS_URL), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (!text.includes('<rss') && !text.includes('<channel')) continue;
      const doc   = new DOMParser().parseFromString(text, 'text/xml');
      const items = [...doc.querySelectorAll('item')].slice(0, 30);
      episodes = items.map(item => ({
        title: clean(item.querySelector('title')?.textContent || 'Untitled'),
        url:   clean(item.querySelector('link')?.textContent  || ''),
        pub:   fmtDate(item.querySelector('pubDate')?.textContent || ''),
        year:  new Date(item.querySelector('pubDate')?.textContent || '').getFullYear() || new Date().getFullYear(),
      }));
      renderEpisodeList();
      return;
    } catch(e) { /* try next proxy */ }
  }
  // All sources failed
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('error-msg').innerHTML =
    'Could not load episodes.<br><br>' +
    '<strong>Quick fix:</strong> Open the <a href="/" style="color:#e8aa30">main app</a> first, ' +
    'then come back here. Episodes will load instantly after that.<br><br>' +
    '<button onclick="loadAdminData()" style="background:#e8aa30;color:#000;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer">Try again</button>';
  document.getElementById('error-msg').style.display = 'block';
}

// ── Render episode list (episodes[] already populated) ─────────────────
function renderEpisodeList() {
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('ep-list').innerHTML = episodes.map((ep, i) => {
    const tag    = tagsByUrl[ep.url];
    const tagged = !!tag;
    return `
      <div class="ep-card${tagged ? ' tagged' : ''}" id="card-${i}">
        <div class="ep-header" onclick="toggleCard(${i})">
          <span class="ep-date">${ep.pub}</span>
          <span class="ep-title">${ep.title}</span>
          ${tagged ? `<span class="ep-badge">✓ ${tag.guestName}</span>` : ''}
        </div>
        <div class="ep-body">
          <label>Guest name</label>
          <input type="text" id="guest-${i}" list="guest-names"
                 placeholder="Choose or type a guest name"
                 value="${tagged ? escHtml(tag.guestName) : ''}">
          <div class="btn-row">
            <button class="save-btn"   onclick="saveTag(${i})">Save</button>
            ${tagged ? `<button class="remove-btn" onclick="removeTag(${i})">Remove</button>` : ''}
          </div>
          <div class="confirm-msg" id="confirm-${i}"></div>
          <div class="srt-row">
            <label>TRANSCRIPT (download .srt from Spotify, upload here)</label>
            <input type="file" id="srt-${i}" accept=".srt,.vtt" onchange="uploadTranscript(${i})" style="display:none">
            <button class="srt-btn" onclick="document.getElementById('srt-${i}').click()">📄 Upload .srt file</button>
            <span class="srt-status" id="srt-status-${i}"></span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  // Close all others
  document.querySelectorAll('.ep-card.open').forEach(c => {
    if (c !== card) c.classList.remove('open');
  });
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    setTimeout(() => document.getElementById('guest-' + idx)?.focus(), 120);
  }
}

// ── Save ────────────────────────────────────────────────────────────────
async function saveTag(idx) {
  if (!db) { alert('Still connecting to database — wait a moment and try again.'); return; }
  const ep        = episodes[idx];
  const guestName = document.getElementById('guest-' + idx).value.trim();
  if (!guestName) { alert('Enter a guest name first.'); return; }

  const data = {
    guestName,
    episodeTitle: ep.title,
    episodeUrl:   ep.url,
    episodePub:   ep.pub,
    episodeYear:  ep.year,
    taggedAt:     firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    const existing = tagsByUrl[ep.url];
    if (existing) {
      await db.collection('episodeTags').doc(existing.id).set(data);
      tagsByUrl[ep.url].guestName = guestName;
    } else {
      const ref = await db.collection('episodeTags').add(data);
      tagsByUrl[ep.url] = { id: ref.id, guestName };
    }
    showConfirm(idx, '✓ Saved! Guest tagged successfully.');
    document.getElementById('card-' + idx).classList.add('tagged');
  } catch(e) {
    alert('Save failed: ' + e.message);
  }
}

// ── Remove ──────────────────────────────────────────────────────────────
async function removeTag(idx) {
  if (!confirm('Remove this guest tag?')) return;
  const ep  = episodes[idx];
  const tag = tagsByUrl[ep.url];
  if (!tag) return;

  try {
    await db.collection('episodeTags').doc(tag.id).delete();
    delete tagsByUrl[ep.url];
    showConfirm(idx, '✓ Removed.');
    document.getElementById('card-' + idx).classList.remove('tagged');
  } catch(e) {
    alert('Remove failed: ' + e.message);
  }
}

// ── Refresh badges after Firestore loads (if episodes already rendered) ──
function applyTagBadges() {
  episodes.forEach((ep, i) => {
    const tag  = tagsByUrl[ep.url];
    const card = document.getElementById('card-' + i);
    if (!card || !tag) return;
    card.classList.add('tagged');
    // Inject badge if not already there
    if (!card.querySelector('.ep-badge')) {
      const badge = document.createElement('span');
      badge.className = 'ep-badge';
      badge.textContent = '✓ ' + tag.guestName;
      card.querySelector('.ep-header').appendChild(badge);
    }
    // Prefill input
    const input = document.getElementById('guest-' + i);
    if (input && !input.value) input.value = tag.guestName;
  });
}

// ── Helpers ─────────────────────────────────────────────────────────────
function showConfirm(idx, msg) {
  const el = document.getElementById('confirm-' + idx);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function clean(s)   { return s.replace(/<!\[CDATA\[|\]\]>/g, '').trim(); }
function escHtml(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

// ── Transcript upload ────────────────────────────────────────────────────
function parseSRT(raw) {
  // Strip sequence numbers, timestamps, blank lines — keep only spoken text
  return raw.split('\n')
    .filter(l => { const t = l.trim(); return t && !/^\d+$/.test(t) && !t.includes('-->'); })
    .join(' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function buildWordIndex(text) {
  const stop = new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','by','from','is','was','are','were','be','been','have','has','had','do','does','did','will','would','could','should','may','might','this','that','these','those','it','its','i','you','he','she','we','they','me','him','her','us','them','my','your','his','our','their','what','which','who','when','where','how','all','just','so','if','not','no','as','up','out','about','into','then','than','more','also','like','some','can','one','two','said','going','think','mean','yeah','okay','right','good','going','get','got','actually','really','very','know','well','even','still','back','they','again']);
  return [...new Set(
    text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(w => w.length > 2 && !stop.has(w))
  )];
}

async function uploadTranscript(idx) {
  const fileInput = document.getElementById('srt-' + idx);
  const statusEl  = document.getElementById('srt-status-' + idx);
  const file = fileInput.files[0];
  if (!file) return;

  statusEl.style.color = 'rgba(255,255,255,.5)';
  statusEl.textContent = 'Saving…';

  try {
    const raw    = await file.text();
    const text   = parseSRT(raw);
    const words  = buildWordIndex(text);
    const ep     = episodes[idx];
    // Use a URL-safe document ID derived from the episode URL
    const docId  = btoa(unescape(encodeURIComponent(ep.url))).replace(/[^a-zA-Z0-9]/g, '_');

    await db.collection('transcripts').doc(docId).set({
      episodeTitle: ep.title,
      episodeUrl:   ep.url,
      episodeYear:  ep.year || new Date().getFullYear(),
      text,
      words,
      uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });

    statusEl.style.color = '#4caf50';
    statusEl.textContent = '✓ Transcript saved — searchable in main app';
  } catch(e) {
    statusEl.style.color = '#ff5555';
    statusEl.textContent = '✗ Failed: ' + e.message;
  }
}
function fmtDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
</script>
